<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>VibeNotes Pro</title>
<meta name="theme-color" content="#121416"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VibeNotes"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/static/icon-192.png"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary-fixed-dim": "#adc6ff",
        "surface-container-high": "#282a2c",
        "surface-dim": "#121416",
        "inverse-primary": "#005bc1",
        "on-surface-variant": "#c4c7c7",
        "surface-container-lowest": "#0c0e10",
        "on-primary-container": "#0078fc",
        "background": "#121416",
        "surface-container-highest": "#333537",
        "secondary-fixed-dim": "#ffb3ae",
        "primary": "#adc6ff",
        "surface-tint": "#adc6ff",
        "on-background": "#e2e2e5",
        "surface": "#121416",
        "on-error": "#690005",
        "surface-container": "#1e2022",
        "secondary": "#ffb3ae",
        "secondary-container": "#a00118",
        "on-primary": "#002e69",
        "on-secondary-container": "#ffa8a3",
        "primary-container": "#00112f",
        "on-tertiary-container": "#2683c1",
        "on-surface": "#e2e2e5",
        "on-error-container": "#ffdad6",
        "secondary-fixed": "#ffdad7",
        "on-secondary": "#68000c",
        "error": "#ffb4ab",
        "inverse-surface": "#e2e2e5",
        "error-container": "#93000a",
        "surface-variant": "#333537",
        "outline": "#8e9192",
        "inverse-on-surface": "#2f3133",
        "primary-fixed": "#d8e2ff",
        "surface-container-low": "#1a1c1e",
        "on-primary-fixed": "#001a41",
        "outline-variant": "#444748"
      },
      fontFamily: { "headline": ["Inter"], "body": ["Inter"], "label": ["Manrope"] },
      borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "2xl": "1rem", "3xl": "1.5rem", "full": "9999px" }
    }
  }
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  body { min-height: 100dvh; zoom: 0.6; }
  .tab-section { display: none; }
  .tab-section.active { display: block; }
  .cal-popup { display:none; position:absolute; top:calc(100% + 8px); left:0; z-index:200; background:#1e2022; border-radius:1rem; padding:16px; min-width:260px; box-shadow:0 12px 40px rgba(0,0,0,0.5); border:1px solid rgba(68,71,72,0.3); }
  .cal-popup.open { display:block; }
  .time-popup { display:none; position:absolute; top:calc(100% + 8px); left:0; z-index:200; background:#1e2022; border-radius:1rem; padding:20px; min-width:220px; box-shadow:0 12px 40px rgba(0,0,0,0.5); border:1px solid rgba(68,71,72,0.3); }
  .time-popup.open { display:block; }
  .cal-day { width:32px; height:32px; border-radius:6px; display:inline-flex; align-items:center; justify-content:center; font-size:0.82rem; cursor:pointer; color:#e2e2e5; background:transparent; border:none; font-family:'Manrope',sans-serif; transition:background 0.15s; }
  .cal-day:hover { background:#282a2c; }
  .cal-day.today { background:#1e2a4a; color:#adc6ff; font-weight:700; }
  .cal-day.selected { background:linear-gradient(135deg,#adc6ff,#0078fc); color:#001a41; font-weight:700; }
  .cal-day.past { color:#444748; cursor:default; }
  .cal-day.past:hover { background:transparent; }
  .cal-day.other-m { color:#2e3030; cursor:default; }
  .cal-day.other-m:hover { background:transparent; }
  select.time-sel { background:#282a2c; color:#e2e2e5; border:1px solid rgba(68,71,72,0.4); border-radius:8px; padding:8px 10px; font-family:'Manrope',sans-serif; font-size:1.1rem; width:100%; outline:none; cursor:pointer; }
  @keyframes toastIn { from{transform:translateX(110%);opacity:0} to{transform:translateX(0);opacity:1} }
  .toast-anim { animation:toastIn 0.25s ease; }
  @keyframes alertPulse { 0%,100%{border-color:rgba(68,71,72,0.3)} 50%{border-color:rgba(173,198,255,0.5)} }
  .alert-pulse { animation:alertPulse 1s infinite; }
  /* Lang toggle */
  .lang-btn { transition: all 0.2s; }
  .lang-btn.active { background: linear-gradient(135deg,#adc6ff,#0078fc); color:#001a41; }
  .lang-btn:not(.active) { background:#282a2c; color:#8e9192; }
</style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col selection:bg-primary selection:text-on-primary">

<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#121416]/80 backdrop-blur-xl flex justify-between items-center px-6 py-4">
  <div class="flex items-center gap-3">
    <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">notes</span>
    <h1 class="font-headline font-black tracking-tighter text-2xl text-on-surface">VibeNotes Pro</h1>
  </div>
  <!-- Language quick toggle in header -->
  <div class="flex gap-1 bg-surface-container rounded-xl p-1">
    <button onclick="setLang('ru')" id="hdr-ru" class="lang-btn text-[11px] font-label font-bold px-3 py-1 rounded-lg">RU</button>
    <button onclick="setLang('en')" id="hdr-en" class="lang-btn text-[11px] font-label font-bold px-3 py-1 rounded-lg">EN</button>
  </div>
</header>

<!-- Main Content -->
<main class="flex-1 mt-16 mb-20 px-6">

  <!-- ===== REMINDERS TAB ===== -->
  <div id="tab-reminders" class="tab-section active">
    <section class="mb-4 pt-2">
      <h2 data-i18n="task_heading" class="text-[1.8rem] font-headline font-extrabold tracking-tighter leading-tight text-on-surface mb-1"></h2>
    </section>

    <section class="mb-4">
      <div class="relative group">
        <textarea id="task-text" data-i18n-ph="task_placeholder" class="w-full bg-surface-container-low border border-outline-variant/40 group-focus-within:border-primary focus:ring-0 text-base font-body text-on-surface placeholder:text-outline/50 min-h-[60px] p-3 rounded-xl transition-all resize-none outline-none"></textarea>
      </div>
    </section>

    <section class="grid grid-cols-2 gap-3 mb-4">
      <div class="relative" id="date-picker-wrap">
        <div id="date-card" onclick="toggleCal()" class="bg-surface-container-low rounded-xl p-4 flex flex-col gap-2 hover:bg-surface-container transition-colors cursor-pointer group">
          <span data-i18n="lbl_date" class="font-label text-[10px] text-primary tracking-widest uppercase"></span>
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-[20px]">calendar_today</span>
            <span class="text-on-surface font-medium" id="date-display-text">—</span>
          </div>
        </div>
        <div class="cal-popup" id="cal-popup">
          <div class="flex items-center justify-between mb-3">
            <button onclick="calPrev(event)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-surface-container-high text-on-surface-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[18px]">chevron_left</span>
            </button>
            <span class="font-label font-bold text-on-surface text-sm" id="cal-title"></span>
            <button onclick="calNext(event)" class="w-8 h-8 flex items-center justify-center rounded-lg bg-surface-container-high text-on-surface-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[18px]">chevron_right</span>
            </button>
          </div>
          <table class="w-full border-collapse" id="cal-table">
            <thead id="cal-thead"></thead>
            <tbody id="cal-body"></tbody>
          </table>
        </div>
      </div>

      <div class="relative" id="time-picker-wrap">
        <div id="time-card" onclick="toggleTime()" class="bg-surface-container-low rounded-xl p-4 flex flex-col gap-2 hover:bg-surface-container transition-colors cursor-pointer group">
          <span data-i18n="lbl_time" class="font-label text-[10px] text-primary tracking-widest uppercase"></span>
          <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors text-[20px]">schedule</span>
            <span class="text-on-surface font-medium" id="time-display-text">—</span>
          </div>
        </div>
        <div class="time-popup" id="time-popup">
          <p data-i18n="lbl_pick_time" class="font-label text-[10px] text-primary tracking-widest uppercase mb-3"></p>
          <div class="flex gap-3 items-center">
            <div class="flex-1">
              <p data-i18n="lbl_hour" class="font-label text-[10px] text-outline-variant mb-1 text-center"></p>
              <select class="time-sel" id="sel-hour" onchange="updateTimeDisplay()"></select>
            </div>
            <span class="text-on-surface-variant font-bold text-xl pb-1">:</span>
            <div class="flex-1">
              <p data-i18n="lbl_min" class="font-label text-[10px] text-outline-variant mb-1 text-center"></p>
              <select class="time-sel" id="sel-min" onchange="updateTimeDisplay()"></select>
            </div>
          </div>
          <button onclick="closeTime()" class="mt-4 w-full py-2 rounded-xl bg-gradient-to-r from-primary to-on-primary-container text-on-primary font-bold text-sm font-label tracking-widest" data-i18n="btn_done"></button>
        </div>
      </div>
    </section>

    <section class="mb-4 flex items-center justify-between bg-surface-container-lowest/50 p-3 rounded-xl">
      <div class="flex items-center gap-3 flex-1">
        <span class="material-symbols-outlined text-outline-variant">sync</span>
        <label data-i18n="repeat_label" class="font-body text-on-surface-variant text-sm"></label>
      </div>
      <select id="repeat-select" class="bg-surface-container-high text-on-surface font-label text-sm rounded-xl px-3 py-2 border border-outline-variant/30 outline-none cursor-pointer">
        <option value="none" data-i18n-opt="repeat_none"></option>
        <option value="daily" data-i18n-opt="repeat_daily"></option>
        <option value="yearly" data-i18n-opt="repeat_yearly"></option>
      </select>
    </section>

    <div id="voice-preview" class="hidden mb-6 bg-surface-container-low rounded-xl p-4 flex items-center gap-3">
      <span class="material-symbols-outlined text-secondary" style="font-variation-settings:'FILL' 1">mic</span>
      <span data-i18n="voice_ready" class="font-label text-sm text-on-surface-variant flex-1"></span>
      <audio id="voice-player" controls class="h-8 flex-1"></audio>
      <button onclick="clearVoice()" class="w-8 h-8 flex items-center justify-center rounded-full bg-error-container/20 text-error hover:bg-error-container/40 transition-colors">
        <span class="material-symbols-outlined text-[16px]">close</span>
      </button>
    </div>

    <section class="flex gap-3 mb-6">
      <button onclick="saveReminder()" class="flex-1 h-11 bg-gradient-to-r from-primary to-on-primary-container text-on-primary font-bold rounded-xl active:scale-95 duration-200 flex items-center justify-center tracking-widest text-sm shadow-lg shadow-primary/10" data-i18n="btn_save"></button>
      <button id="voice-btn" onclick="toggleRecording()" class="w-11 h-11 bg-surface-container-highest text-secondary rounded-xl flex items-center justify-center active:scale-90 transition-all border border-outline-variant/10">
        <span class="material-symbols-outlined" id="voice-icon" style="font-variation-settings:'FILL' 1">mic</span>
      </button>
      <button onclick="clearForm()" class="w-11 h-11 bg-surface-container text-on-surface-variant rounded-xl flex items-center justify-center active:scale-90 transition-all border border-outline-variant/10">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </section>

    <section>
      <div class="flex items-center justify-between mb-4">
        <h3 data-i18n="active_reminders" class="font-label text-xs font-bold tracking-[0.2em] text-outline uppercase"></h3>
        <span id="reminder-count" class="bg-surface-container-high px-2 py-0.5 rounded text-[10px] text-on-surface-variant font-label">0</span>
      </div>
      <div id="reminders-list" class="space-y-3">
        <p data-i18n="no_reminders" class="text-center text-outline font-label text-sm py-8"></p>
      </div>
    </section>
  </div>

  <!-- ===== NOTES TAB ===== -->
  <div id="tab-notes" class="tab-section">
    <section class="mb-6 pt-4">
      <h2 data-i18n="notes_heading" class="text-[2.5rem] font-headline font-extrabold tracking-tighter leading-tight text-on-surface mb-1"></h2>
      <p data-i18n="notes_sub" class="font-label text-on-surface-variant text-sm tracking-wide"></p>
    </section>
    <div class="relative group mb-4">
      <input type="text" id="note-title" data-i18n-ph="note_title_ph" class="w-full bg-transparent border-none focus:ring-0 text-lg font-bold text-on-surface placeholder:text-outline/40 p-0 outline-none pb-2 border-b border-outline-variant/30 focus:border-b focus:border-primary"/>
    </div>
    <div class="relative group mb-4">
      <textarea id="note-content" data-i18n-ph="note_content_ph" class="w-full bg-transparent border-none focus:ring-0 text-base font-body text-on-surface placeholder:text-outline/40 min-h-[120px] p-0 resize-none outline-none"></textarea>
      <div class="absolute bottom-0 left-0 w-full h-[1px] bg-outline-variant/30 group-focus-within:bg-primary transition-all duration-300"></div>
    </div>

    <!-- Reminder toggle for note -->
    <div class="mb-5">
      <button onclick="toggleNoteReminder()" class="flex items-center gap-2 text-sm font-label text-on-surface-variant hover:text-primary transition-colors py-1">
        <span class="material-symbols-outlined text-[18px]" id="note-reminder-icon">alarm_add</span>
        <span data-i18n="note_add_reminder" id="note-reminder-toggle-label"></span>
      </button>
      <div id="note-reminder-panel" class="hidden mt-3 bg-surface-container-lowest/60 border border-outline-variant/20 rounded-2xl p-4 space-y-3">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="font-label text-[10px] text-primary tracking-widest uppercase block mb-2" data-i18n="lbl_date"></label>
            <input type="date" id="note-reminder-date" class="w-full bg-surface-container-high text-on-surface font-label text-sm rounded-xl px-3 py-2 border border-outline-variant/30 outline-none focus:border-primary transition-colors cursor-pointer"/>
          </div>
          <div>
            <label class="font-label text-[10px] text-primary tracking-widest uppercase block mb-2" data-i18n="lbl_time"></label>
            <input type="time" id="note-reminder-time" class="w-full bg-surface-container-high text-on-surface font-label text-sm rounded-xl px-3 py-2 border border-outline-variant/30 outline-none focus:border-primary transition-colors cursor-pointer"/>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <span class="font-body text-on-surface-variant text-sm flex items-center gap-2">
            <span class="material-symbols-outlined text-outline-variant text-[18px]">sync</span>
            <span data-i18n="repeat_label"></span>
          </span>
          <select id="note-repeat-select" class="bg-surface-container-high text-on-surface font-label text-sm rounded-xl px-3 py-2 border border-outline-variant/30 outline-none cursor-pointer">
            <option value="none" data-i18n-opt="repeat_none"></option>
            <option value="daily" data-i18n-opt="repeat_daily"></option>
            <option value="yearly" data-i18n-opt="repeat_yearly"></option>
          </select>
        </div>
      </div>
    </div>

    <div class="flex gap-3 mb-10">
      <button onclick="saveNote()" class="flex-1 h-12 bg-gradient-to-r from-primary to-on-primary-container text-on-primary font-bold rounded-xl active:scale-95 duration-200 tracking-widest text-sm" data-i18n="btn_save"></button>
      <button onclick="clearNoteForm()" class="w-12 h-12 bg-surface-container text-on-surface-variant rounded-xl flex items-center justify-center active:scale-90 transition-all border border-outline-variant/10">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>

    <div>
      <h3 data-i18n="my_notes" class="font-label text-xs font-bold tracking-[0.2em] text-outline uppercase mb-4"></h3>
      <div id="notes-list" class="space-y-3">
        <p data-i18n="no_notes" class="text-center text-outline font-label text-sm py-8"></p>
      </div>
    </div>
  </div>

  <!-- ===== VOICE TAB ===== -->
  <div id="tab-voice" class="tab-section">
    <section class="mb-10 pt-4">
      <h2 data-i18n="voice_heading" class="text-[2.5rem] font-headline font-extrabold tracking-tighter leading-tight text-on-surface mb-1"></h2>
      <p data-i18n="voice_sub" class="font-label text-on-surface-variant text-sm tracking-wide"></p>
    </section>
    <div class="flex flex-col items-center gap-4 mb-10">
      <button id="voice-tab-btn" onclick="toggleVoiceTab()" class="w-24 h-24 rounded-full flex items-center justify-center bg-surface-container-high border border-outline-variant/20 active:scale-90 transition-all">
        <span class="material-symbols-outlined text-secondary text-[2.5rem]" id="voice-tab-icon" style="font-variation-settings:'FILL' 1">mic</span>
      </button>
      <div id="voice-tab-status" data-i18n="press_record" class="font-label text-sm text-on-surface-variant"></div>
      <div id="voice-tab-timer" class="hidden font-label font-bold text-2xl text-on-surface tracking-[0.1em]">00:00</div>
    </div>
    <div id="voice-tab-preview" class="hidden mb-6 bg-surface-container-low rounded-xl p-4 flex items-center gap-3">
      <span class="material-symbols-outlined text-secondary" style="font-variation-settings:'FILL' 1">mic</span>
      <audio id="voice-tab-player" controls class="flex-1 h-8"></audio>
      <button onclick="saveVoiceNoteTab()" class="px-4 py-2 rounded-xl bg-gradient-to-r from-primary to-on-primary-container text-on-primary font-label font-bold text-xs tracking-widest" data-i18n="btn_save"></button>
    </div>
    <h3 data-i18n="voice_notes_heading" class="font-label text-xs font-bold tracking-[0.2em] text-outline uppercase mb-4"></h3>
    <div id="voice-notes-list" class="space-y-3">
      <p data-i18n="no_voice_notes" class="text-center text-outline font-label text-sm py-8"></p>
    </div>
  </div>

  <!-- ===== SETTINGS TAB ===== -->
  <div id="tab-settings" class="tab-section">
    <section class="mb-10 pt-4">
      <h2 data-i18n="settings_heading" class="text-[2.5rem] font-headline font-extrabold tracking-tighter leading-tight text-on-surface mb-1"></h2>
      <p data-i18n="settings_sub" class="font-label text-on-surface-variant text-sm tracking-wide"></p>
    </section>

    <!-- Language switcher -->
    <div class="bg-surface-container-low rounded-2xl p-5 mb-4">
      <div class="flex items-center justify-between mb-4">
        <div>
          <p data-i18n="lbl_language" class="text-on-surface font-medium text-sm"></p>
          <p data-i18n="lbl_language_sub" class="font-label text-xs text-on-surface-variant"></p>
        </div>
        <span class="material-symbols-outlined text-primary">translate</span>
      </div>
      <div class="flex gap-2">
        <button onclick="setLang('ru')" id="set-ru" class="lang-btn flex-1 py-3 rounded-xl font-label font-bold text-sm tracking-widest">
          🇷🇺 Русский
        </button>
        <button onclick="setLang('en')" id="set-en" class="lang-btn flex-1 py-3 rounded-xl font-label font-bold text-sm tracking-widest">
          🇬🇧 English
        </button>
      </div>
    </div>

    <div class="bg-surface-container-low rounded-2xl p-5 space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <p data-i18n="check_interval" class="text-on-surface font-medium text-sm"></p>
          <p data-i18n="check_interval_sub" class="font-label text-xs text-on-surface-variant"></p>
        </div>
        <span class="material-symbols-outlined text-primary">timer</span>
      </div>
      <div class="h-[1px] bg-outline-variant/20"></div>
      <div class="flex items-center justify-between">
        <div>
          <p data-i18n="lbl_version" class="text-on-surface font-medium text-sm"></p>
          <p class="font-label text-xs text-on-surface-variant">VibeNotes Pro 2.0</p>
        </div>
        <span class="material-symbols-outlined text-outline-variant">info</span>
      </div>
    </div>
  </div>

</main>

<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#121416]/80 backdrop-blur-xl flex justify-around items-center px-4 pb-6 pt-2 rounded-t-3xl shadow-[0_-12px_40px_rgba(0,0,0,0.4)]">
  <button onclick="switchTab('notes')" id="nav-notes" class="flex flex-col items-center justify-center text-on-surface/40 px-4 py-2 hover:text-primary transition-all active:scale-90 duration-300 rounded-xl">
    <span class="material-symbols-outlined mb-1">edit_note</span>
    <span data-i18n="nav_notes" class="font-label text-[10px] font-medium tracking-wide"></span>
  </button>
  <button onclick="switchTab('reminders')" id="nav-reminders" class="flex flex-col items-center justify-center bg-surface-container-low text-primary rounded-2xl px-4 py-2 active:scale-90 duration-300">
    <span class="material-symbols-outlined mb-1" style="font-variation-settings:'FILL' 1">alarm</span>
    <span data-i18n="nav_tasks" class="font-label text-[10px] font-medium tracking-wide"></span>
  </button>
  <button onclick="switchTab('voice')" id="nav-voice" class="flex flex-col items-center justify-center text-on-surface/40 px-4 py-2 hover:text-primary transition-all active:scale-90 duration-300 rounded-xl">
    <span class="material-symbols-outlined mb-1">mic</span>
    <span data-i18n="nav_voice" class="font-label text-[10px] font-medium tracking-wide"></span>
  </button>
  <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center justify-center text-on-surface/40 px-4 py-2 hover:text-primary transition-all active:scale-90 duration-300 rounded-xl">
    <span class="material-symbols-outlined mb-1">settings</span>
    <span data-i18n="nav_settings" class="font-label text-[10px] font-medium tracking-wide"></span>
  </button>
</nav>

<!-- Reminder alert -->

let currentLang = localStorage.getItem('vn_lang') || 'ru';

function t(key) {
  const v = TRANS[currentLang][key];
  if (v !== undefined) return v;
  const vru = TRANS['ru'][key];
  if (vru !== undefined) return vru;
  return key;
}

function applyTranslations() {
  // text content
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-ph'));
  });
  // select options
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n-opt'));
  });
  // lang buttons active state
  ['ru','en'].forEach(lang => {
    const setBtns = [document.getElementById('set-' + lang), document.getElementById('hdr-' + lang)];
    setBtns.forEach(btn => {
      if (!btn) return;
      if (lang === currentLang) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  });
  // update html lang attr
  document.documentElement.lang = currentLang;
  // re-render calendar header if open
  renderCal();
  // update voice status text if needed
  const statusEl = document.getElementById('voice-tab-status');
  if (statusEl && (vtRecorder === null || vtRecorder.state === 'inactive')) {
    statusEl.textContent = t('press_record');
  }
  // refresh reminder list (for "no reminders" text and "active" label)
  loadReminders();
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('vn_lang', lang);
  applyTranslations();
}

// CALENDAR
// ============================================================
let calYear = nowInit.getFullYear(), calMonth = nowInit.getMonth();
let selectedDate = new Date(nowInit.getFullYear(), nowInit.getMonth(), nowInit.getDate());

function fmtDateRU(d) {
  return String(d.getDate()).padStart(2,'0') + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + d.getFullYear();
}

function updateDateDisplay() {
  document.getElementById('date-display-text').textContent = fmtDateRU(selectedDate);
}

function renderCal() {
  const months = t('months');
  const titleEl = document.getElementById('cal-title');
  if (titleEl) titleEl.textContent = months[calMonth] + ' ' + calYear;

  const days = t('days_short');
  const thead = document.getElementById('cal-thead');
  if (thead) {
    thead.innerHTML = '<tr>' + days.map(d => `<th class="font-label text-[10px] text-outline-variant text-center pb-2 font-semibold tracking-widest">${d}</th>`).join('') + '</tr>';
  }

  const today = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(calYear, calMonth, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;

  const tbody = document.getElementById('cal-body');
  if (!tbody) return;
  tbody.innerHTML = '';
  let day = 1 - startDow;
  for (let row = 0; row < 6; row++) {
    const tr = document.createElement('tr');
    let visible = false;
    for (let col = 0; col < 7; col++, day++) {
      const td = document.createElement('td'); td.className = 'text-center p-0.5';
      const d = new Date(calYear, calMonth, day);
      const btn = document.createElement('button');
      btn.className = 'cal-day';
      btn.textContent = d.getDate();
      if (d.getMonth() !== calMonth) { btn.classList.add('other-m'); }
      else {
        visible = true;
        const dCopy = new Date(d);
        if (d < today) { btn.classList.add('past'); }
        else { btn.addEventListener('click', () => pickDay(dCopy)); }
        if (d.toDateString() === today.toDateString()) btn.classList.add('today');
        if (d.toDateString() === selectedDate.toDateString()) btn.classList.add('selected');
      }
      td.appendChild(btn); tr.appendChild(td);
    }
    if (row === 0 || visible) tbody.appendChild(tr);
    const lastDay = new Date(calYear, calMonth + 1, 0);
    if (day > lastDay.getDate() + 6) break;
  }
}

function pickDay(d) { selectedDate = d; updateDateDisplay(); closeCal(); }

function toggleCal() {
  const popup = document.getElementById('cal-popup');
  closeTime();
  if (popup.classList.contains('open')) { closeCal(); }
  else { calYear = selectedDate.getFullYear(); calMonth = selectedDate.getMonth(); renderCal(); popup.classList.add('open'); }
}

function closeCal() { document.getElementById('cal-popup').classList.remove('open'); }
function calPrev(e) { e.stopPropagation(); calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCal(); }
function calNext(e) { e.stopPropagation(); calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; } renderCal(); }

// VOICE (Reminders tab)
// ============================================================
let mediaRecorder = null, audioChunks = [], recordedBlob = null;
let recInterval = null, recSecs = 0, voiceFilename = null;

function toggleRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') startRec();
  else stopRec();
}

async function startRec() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = []; recordedBlob = null; voiceFilename = null;
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(tr => tr.stop());
      recordedBlob = new Blob(audioChunks, { type: 'audio/webm' });
      document.getElementById('voice-player').src = URL.createObjectURL(recordedBlob);
      const vp = document.getElementById('voice-preview');
      vp.classList.remove('hidden'); vp.classList.add('flex');
    };
    mediaRecorder.start();
    recSecs = 0;
    recInterval = setInterval(() => { recSecs++; }, 1000);
    document.getElementById('voice-icon').textContent = 'stop';
    document.getElementById('voice-btn').classList.add('!text-error','!bg-error-container/30');
  } catch(e) { toast(t('toast_no_mic'), 'err'); }
}

function stopRec() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  clearInterval(recInterval);
  document.getElementById('voice-icon').textContent = 'mic';
  document.getElementById('voice-btn').classList.remove('!text-error','!bg-error-container/30');
}

function clearVoice() {
  recordedBlob = null; voiceFilename = null;
  const vp = document.getElementById('voice-preview');
  vp.classList.add('hidden'); vp.classList.remove('flex');
  document.getElementById('voice-player').src = '';
}

async function uploadVoiceIfNeeded() {
  if (!recordedBlob) return null;
  if (voiceFilename) return voiceFilename;
  const fname = 'voice_' + Date.now() + '.webm';
  const fd = new FormData();
  fd.append('file', recordedBlob, fname);
  const res = await fetch('/api/voice-notes/upload', { method:'POST', body:fd });
  const data = await res.json();
  if (data.success) { voiceFilename = data.filename; return data.filename; }
  return null;
}

// ============================================================
// SAVE REMINDER
// ============================================================
function fmtDTForAPI(dt) {
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' +
    String(dt.getDate()).padStart(2,'0') + ' ' +
    document.getElementById('sel-hour').value + ':' +
    document.getElementById('sel-min').value;
}

function fmtDTDisplay(dtStr) {
  if (!dtStr) return '—';
  const parts = dtStr.split(' ');
  if (parts.length < 2) return dtStr;
  const [dp, tp] = parts;
  const dateParts = dp.split('-');
  if (dateParts.length < 3) return dtStr;
  const [y, m, d] = dateParts;
  return `${d}.${m}.${y} ${tp}`;
}

async function saveReminder() {
  const message = document.getElementById('task-text').value.trim();
  if (!message) { toast(t('err_no_text'), 'err'); return; }
  const hour = +document.getElementById('sel-hour').value;
  const min  = +document.getElementById('sel-min').value;
  const dt = new Date(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate(), hour, min);
  if (dt <= new Date()) { toast(t('err_future'), 'err'); return; }
  const repeatVal = document.getElementById('repeat-select').value;
  const repeatDaily = repeatVal === 'daily';
  const repeatYearly = repeatVal === 'yearly';
  let vFile = null;
  if (recordedBlob) { vFile = await uploadVoiceIfNeeded(); }
  const res = await fetch('/api/reminders', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ type: vFile ? 'voice' : 'text', message, datetime: fmtDTForAPI(dt), repeat_daily: repeatDaily, repeat_yearly: repeatYearly, voice_file: vFile })
  });
  const data = await res.json();
  if (data.success) { toast(t('toast_saved')); clearForm(); loadReminders(); }
  else { toast(data.error || 'Error', 'err'); }
}

function clearForm() {
  document.getElementById('task-text').value = '';
  document.getElementById('repeat-select').value = 'none';
  clearVoice(); stopRec();
  const n = new Date();
  selectedDate = new Date(n.getFullYear(), n.getMonth(), n.getDate());
  selHour.value = String(n.getHours()).padStart(2,'0');
  selMin.value  = String(n.getMinutes()).padStart(2,'0');
  updateDateDisplay(); updateTimeDisplay();
}

// LOAD REMINDERS
// ============================================================
async function loadReminders() {
  const res = await fetch('/api/reminders');
  const reminders = await res.json();
  const container = document.getElementById('reminders-list');
  const active = reminders.filter(r => r.status === 'Ожидание');
  active.sort((a,b) => a.datetime.localeCompare(b.datetime));
  document.getElementById('reminder-count').textContent = active.length + ' ' + t('active_count');
  if (!active.length) {
    container.innerHTML = `<p class="text-center text-outline font-label text-sm py-8">${t('no_reminders')}</p>`;
    return;
  }
  container.innerHTML = active.map(r => {
    const preview = r.message.length > 45 ? r.message.slice(0,45) + '…' : r.message;
    const typeIcon = r.type === 'voice' ? 'mic' : r.type === 'note' ? 'edit_note' : 'notifications';
    const repeatBadge = r.repeat_yearly
      ? `<span class="font-label text-[10px] text-primary/70 bg-primary-container px-1.5 py-0.5 rounded-full" title="${t('repeat_yearly')}">↻ ${t('repeat_yearly')}</span>`
      : r.repeat_daily
        ? `<span class="font-label text-[10px] text-primary/70 bg-primary-container px-1.5 py-0.5 rounded-full" title="${t('repeat_daily')}">↻ ${t('repeat_daily')}</span>`
        : '';
    return `<div class="bg-surface-container-low rounded-2xl p-5 flex items-center justify-between group">
      <div class="flex flex-col gap-1 flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-label text-[10px] text-secondary font-semibold">${fmtDTDisplay(r.datetime)}</span>
          <div class="w-1 h-1 rounded-full bg-outline-variant"></div>
          <span class="material-symbols-outlined text-[14px] text-on-tertiary-container">${typeIcon}</span>
          ${repeatBadge}
        </div>
        <p class="text-on-surface font-medium text-sm truncate">${escHtml(preview)}</p>
      </div>
      <button onclick="deleteReminder(${r.id})" class="ml-3 w-10 h-10 flex items-center justify-center rounded-full bg-error-container/20 text-error hover:bg-error-container/40 transition-colors flex-shrink-0">
        <span class="material-symbols-outlined text-[20px]">delete</span>
      </button>
    </div>`;
  }).join('');
}

async function deleteReminder(id) {
  await fetch(`/api/reminders/${id}`, { method:'DELETE' });
  toast(t('toast_deleted'));
  loadReminders();
}

  const icon  = document.getElementById('note-reminder-icon');

    icon.style.color = 'var(--tw-color-primary, #adc6ff)';
    label.textContent = t('note_reminder_on');
    // default date = today, time = current hour+1
    const now = new Date();
    now.setHours(now.getHours() + 1, 0, 0, 0);
    const pad = v => String(v).padStart(2,'0');
    document.getElementById('note-reminder-date').value =
      `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

    panel.classList.add('hidden');
    icon.textContent = 'alarm_add';
    icon.style.color = '';

  if (!notes.length) {
    container.innerHTML = `<p class="text-center text-outline font-label text-sm py-8">${t('no_notes')}</p>`;
    return;
  }
  container.innerHTML = notes.map(n => {
    const reminderBadge = n.reminder_datetime ? `
      <div class="flex items-center gap-1.5 mt-2 flex-wrap">
        <span class="material-symbols-outlined text-[13px] text-primary" style="font-variation-settings:'FILL' 1">alarm</span>
        <span class="font-label text-[10px] text-primary font-semibold">${t('note_reminder_badge')} ${fmtDTDisplay(n.reminder_datetime)}</span>
        ${n.reminder_repeat && n.reminder_repeat !== 'none' ? `<span class="font-label text-[10px] text-primary/70 bg-primary-container px-1.5 py-0.5 rounded-full">↻ ${t('repeat_' + n.reminder_repeat)}</span>` : ''}
      </div>` : '';
    return `<div class="bg-surface-container-low rounded-2xl p-5 group">
      <div class="flex items-start justify-between mb-1">
        <p class="text-on-surface font-semibold">${escHtml(n.title)}</p>
        <button onclick="deleteNote(${n.id})" class="w-8 h-8 flex items-center justify-center rounded-full bg-error-container/20 text-error hover:bg-error-container/40 transition-colors flex-shrink-0 ml-2">
          <span class="material-symbols-outlined text-[16px]">delete</span>
        </button>
      </div>
      <p class="font-label text-[10px] text-on-surface-variant mb-2">${n.date}</p>
      <p class="text-on-surface-variant text-sm whitespace-pre-line">${escHtml(n.content || n.preview)}</p>
      ${reminderBadge}
    </div>`;
  }).join('');
}

async function saveNote() {
  const title = document.getElementById('note-title').value.trim();
  const content = document.getElementById('note-content').value.trim();
  if (!title || !content) { toast(t('err_no_note'), 'err'); return; }

  let reminder_datetime = null;
  let reminder_repeat = 'none';
  if (noteReminderOpen) {
    const dateVal = document.getElementById('note-reminder-date').value;
    const timeVal = document.getElementById('note-reminder-time').value;
    if (dateVal && timeVal) {
      const dt = new Date(dateVal + 'T' + timeVal);
      if (dt <= new Date()) { toast(t('err_future'), 'err'); return; }
      const pad = v => String(v).padStart(2,'0');
      reminder_datetime = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    }
    reminder_repeat = document.getElementById('note-repeat-select').value;
  }

  const res = await fetch('/api/notes', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ title, content, reminder_datetime, reminder_repeat })
  });
  const data = await res.json();
  if (data.success) {
    toast(reminder_datetime ? t('toast_note_reminder_saved') : t('toast_note_saved'));
    clearNoteForm();
    loadNotes();
  } else { toast(data.error, 'err'); }
}

async function deleteNote(id) {
  await fetch(`/api/notes/${id}`, { method:'DELETE' });
  toast(t('toast_deleted'));
  loadNotes();
}

// ============================================================
// VOICE NOTES TAB
// ============================================================
let vtRecorder = null, vtChunks = [], vtBlob = null, vtInterval = null, vtSecs = 0;

async function toggleVoiceTab() {
  if (!vtRecorder || vtRecorder.state === 'inactive') {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      vtRecorder = new MediaRecorder(stream);
      vtChunks = []; vtBlob = null;
      vtRecorder.ondataavailable = e => { if (e.data.size > 0) vtChunks.push(e.data); };
      vtRecorder.onstop = () => {
        stream.getTracks().forEach(tr => tr.stop());
        vtBlob = new Blob(vtChunks, { type: 'audio/webm' });
        document.getElementById('voice-tab-player').src = URL.createObjectURL(vtBlob);
        const vtp = document.getElementById('voice-tab-preview');
        vtp.classList.remove('hidden'); vtp.classList.add('flex');
        document.getElementById('voice-tab-timer').classList.add('hidden');
        document.getElementById('voice-tab-status').textContent = t('rec_done');
      };
      vtRecorder.start();
      vtSecs = 0;
      vtInterval = setInterval(() => {
        vtSecs++;
        const m = String(Math.floor(vtSecs/60)).padStart(2,'0');
        const s = String(vtSecs%60).padStart(2,'0');
        document.getElementById('voice-tab-timer').textContent = `${m}:${s}`;
      }, 1000);
      document.getElementById('voice-tab-icon').textContent = 'stop';
      document.getElementById('voice-tab-btn').classList.add('!bg-error-container/30');
      document.getElementById('voice-tab-status').textContent = t('recording');
      document.getElementById('voice-tab-timer').classList.remove('hidden');
      const vtp = document.getElementById('voice-tab-preview');
      vtp.classList.add('hidden'); vtp.classList.remove('flex');
    } catch(e) { toast(t('toast_no_mic'), 'err'); }
  } else {
    vtRecorder.stop(); clearInterval(vtInterval);
    document.getElementById('voice-tab-icon').textContent = 'mic';
    document.getElementById('voice-tab-btn').classList.remove('!bg-error-container/30');
  }
}

async function saveVoiceNoteTab() {
  if (!vtBlob) return;
  const name = prompt(t('voice_name_prompt'), 'voice_' + new Date().toISOString().slice(0,10));
  if (!name) return;
  const fd = new FormData();
  fd.append('file', vtBlob, name + '.webm');
  const res = await fetch('/api/voice-notes/upload', { method:'POST', body:fd });
  const data = await res.json();
  if (data.success) {
    toast(t('toast_voice_saved'));
    vtBlob = null;
    const vtp = document.getElementById('voice-tab-preview');
    vtp.classList.add('hidden'); vtp.classList.remove('flex');
    document.getElementById('voice-tab-status').textContent = t('press_record');
    loadVoiceNotes();
  }
}

async function loadVoiceNotes() {
  const res = await fetch('/api/voice-notes');
  const notes = await res.json();
  const container = document.getElementById('voice-notes-list');
  if (!notes.length) {
    container.innerHTML = `<p class="text-center text-outline font-label text-sm py-8">${t('no_voice_notes')}</p>`;
    return;
  }
  container.innerHTML = notes.map(n => `
    <div class="bg-surface-container-low rounded-2xl p-4 flex items-center gap-3">
      <span class="material-symbols-outlined text-secondary flex-shrink-0" style="font-variation-settings:'FILL' 1">audio_file</span>
      <div class="flex-1 min-w-0">
        <p class="text-on-surface text-sm font-medium truncate">${escHtml(n.name)}</p>
        <p class="font-label text-[10px] text-on-surface-variant">${n.date}</p>
      </div>
      <audio controls src="/voice_notes/${encodeURIComponent(n.name)}" class="h-8 w-28 flex-shrink-0"></audio>
      <button onclick="deleteVoiceNote('${escJs(n.name)}')" class="w-8 h-8 flex items-center justify-center rounded-full bg-error-container/20 text-error hover:bg-error-container/40 transition-colors flex-shrink-0">
        <span class="material-symbols-outlined text-[16px]">delete</span>
      </button>
    </div>
  `).join('');
}

async function deleteVoiceNote(name) {
  await fetch(`/api/voice-notes/${encodeURIComponent(name)}`, { method:'DELETE' });
  toast(t('toast_deleted'));
  loadVoiceNotes();
}

// ============================================================
// ALERTS
// ============================================================
let alertQueue = [];

function playAlertSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [880, 1100, 880, 1100];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.18);
      gain.gain.setValueAtTime(0.4, ctx.currentTime + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.15);
      osc.start(ctx.currentTime + i * 0.18);
      osc.stop(ctx.currentTime + i * 0.18 + 0.15);
    });
  } catch(e) {}
}

async function checkAlerts() {
  const res = await fetch('/api/reminders/check');
  const data = await res.json();
  if (data.triggered && data.triggered.length) {
    data.triggered.forEach(r => alertQueue.push(r));
    showNextAlert(); loadReminders();
  }
}

let alertSoundInterval = null;

function showNextAlert() {
  if (!alertQueue.length) return;
  const r = alertQueue.shift();
  document.getElementById('alert-text').textContent = r.message;
  const detailEl = document.getElementById('alert-detail');
  if (r.note_content) {
    detailEl.textContent = r.note_content;
    detailEl.classList.remove('hidden');
  } else {
    detailEl.textContent = '';
    detailEl.classList.add('hidden');
  }
  const el = document.getElementById('alert-overlay');
  el.classList.remove('hidden'); el.classList.add('flex');
  playAlertSound();
  if (alertSoundInterval) clearInterval(alertSoundInterval);
  alertSoundInterval = setInterval(playAlertSound, 60000);
}

function dismissAlert() {
  if (alertSoundInterval) { clearInterval(alertSoundInterval); alertSoundInterval = null; }
  const el = document.getElementById('alert-overlay');
  el.classList.add('hidden'); el.classList.remove('flex');
  if (alertQueue.length) setTimeout(showNextAlert, 300);
}

// ============================================================
// UTILS
// ============================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

// ============================================================
// START
// ============================================================
applyTranslations();
loadReminders();
setInterval(checkAlerts, 30000);
checkAlerts(); // fires immediately — catches any reminders missed while server was off

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
